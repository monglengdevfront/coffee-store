<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <style>
      .fs-60 {
        font-size: 60px;
      }
      .fs-120 {
        font-size: 120px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-info navbar-dark">
      <div class="container">
        <a class="navbar-brand text-white" href="#">SETEC Institute</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active text-white" aria-current="page" href="#"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#">About US</a>
            </li>
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle text-white"
                href="#"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Settings
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Web Development</a></li>
                <li>
                  <a class="dropdown-item" href="#">Mobile Development</a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item" href="#">Database</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link disabled text-white" aria-disabled="true"
                >Login</a
              >
            </li>
          </ul>
          <form class="d-flex" role="search">
            <div class="input-group me-2">
              <span
                class="input-group-text rounded-start-5 border-end-0 bg-white"
              >
                <i class="bi bi-search"></i>
              </span>
              <input
                class="form-control rounded-end-5 border-start-0"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
            </div>
          </form>
          <i class="bi bi-bell fs-5 ms-3 text-white"></i>
          <i class="bi bi-heart fs-5 ms-3 text-white"></i>
          <i class="bi bi-bag fs-5 ms-3 text-white"></i>
          <a
            href="#"
            class="text-white ms-3 fs-5 fw-semibold text-decoration-none"
          >
            login</a
          >
          <a
            href="#"
            class="text-white ms-3 fs-5 fw-semibold text-decoration-none"
          >
            register</a
          >
        </div>
      </div>
    </nav> <!-- navbar end -->

    <div class="container">
        <div class="row">
            <div class="col-6 bg-primary text-center">
                a
            </div>
            <div class="col-6 bg-danger text-center">
                b
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-3 bg-success">
                c
            </div>
            <div class="col-3 bg-warning">
                d
            </div>
            <div class="col-3 bg-primary">
                e
            </div>
            <div class="col-3 bg-secondary">
                f
            </div>
        </div>
    </div>
    <!--Test coloum and row screen tab mb and pc-->
        <div class="container">
        <div class="row">
            <div class="col-md-4 bg-warning">B</div>
            <div class="col-md-4 bg-dark" >B</div>
            <div class="col-md-4 bg-primary" >B</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
