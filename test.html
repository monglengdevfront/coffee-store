<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Cart</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">


<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-cup-hot"></i>
            Coffee House
        </a>

        <a href="index.html" class="btn btn-warning">
            Continue Shopping
        </a>

    </div>

</nav>



<!-- Cart Section -->
<section class="container py-5">


    <h1 class="fw-bold mb-4">
        <i class="bi bi-cart3"></i>
        Your Cart
    </h1>



    <div class="row g-4">


        <!-- Cart List -->
        <div class="col-lg-8">


            <div class="card shadow-sm border-0">


                <div class="card-body">



                    <!-- Item 1 -->
                    <div class="row align-items-center border-bottom pb-3 mb-3">


                        <div class="col-md-3">

                            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085"
                            class="img-fluid rounded">

                        </div>


                        <div class="col-md-4">

                            <h5 class="fw-bold">
                                Iced Latte
                            </h5>

                            <p class="text-muted mb-0">
                                $20 × 2 cups
                            </p>

                        </div>


                        <div class="col-md-3">

                            <h5 class="text-success">
                                $40
                            </h5>

                        </div>


                        <div class="col-md-2">

                            <button class="btn btn-outline-danger btn-sm">
                                Remove
                            </button>

                        </div>


                    </div>





                    <!-- Item 2 -->
                    <div class="row align-items-center border-bottom pb-3 mb-3">


                        <div class="col-md-3">

                            <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd"
                            class="img-fluid rounded">

                        </div>


                        <div class="col-md-4">

                            <h5 class="fw-bold">
                                Cappuccino
                            </h5>

                            <p class="text-muted mb-0">
                                $15 × 1 cup
                            </p>

                        </div>


                        <div class="col-md-3">

                            <h5 class="text-success">
                                $15
                            </h5>

                        </div>


                        <div class="col-md-2">

                            <button class="btn btn-outline-danger btn-sm">
                                Remove
                            </button>

                        </div>


                    </div>






                    <!-- Item 3 -->
                    <div class="row align-items-center">


                        <div class="col-md-3">

                            <img src="https://images.unsplash.com/photo-1445116572660-236099ec97a0"
                            class="img-fluid rounded">

                        </div>


                        <div class="col-md-4">

                            <h5 class="fw-bold">
                                Espresso
                            </h5>

                            <p class="text-muted mb-0">
                                $10 × 3 cups
                            </p>

                        </div>


                        <div class="col-md-3">

                            <h5 class="text-success">
                                $30
                            </h5>

                        </div>


                        <div class="col-md-2">

                            <button class="btn btn-outline-danger btn-sm">
                                Remove
                            </button>

                        </div>


                    </div>



                </div>


            </div>


        </div>





        <!-- Checkout Summary -->
        <div class="col-lg-4">


            <div class="card shadow-sm border-0">


                <div class="card-body">


                    <h4 class="fw-bold mb-4">
                        Order Summary
                    </h4>



                    <div class="d-flex justify-content-between mb-3">
                        <span>Iced Latte × 2</span>
                        <span>$40</span>
                    </div>



                    <div class="d-flex justify-content-between mb-3">
                        <span>Cappuccino × 1</span>
                        <span>$15</span>
                    </div>



                    <div class="d-flex justify-content-between mb-3">
                        <span>Espresso × 3</span>
                        <span>$30</span>
                    </div>



                    <hr>



                    <div class="d-flex justify-content-between mb-3">

                        <span>
                            Delivery
                        </span>

                        <span>
                            $2
                        </span>

                    </div>



                    <hr>



                    <div class="d-flex justify-content-between">

                        <h5 class="fw-bold">
                            Total
                        </h5>

                        <h5 class="fw-bold text-success">
                            $87
                        </h5>

                    </div>



                    <button class="btn btn-dark w-100 mt-4">
                        Checkout
                    </button>


                </div>


            </div>


        </div>



    </div>


</section>


</body>
</html>
